name: OpenTelemetry
on:
  workflow_run:
    workflows:
      - .github/workflows/copilot-setup-steps.yml
      - Autoversion
      - Claude
      - CodeQL
      - Copilot cloud agent
      - Copilot code review
      - Copilot coding agent
      - OpenAI Codex
      - Recompile Agentic Workflows
      - Renovate
      - Validate Renovate Config
    types:
      - completed
jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: plengauer/opentelemetry-github/actions/instrument/workflow@edc52fb91829fdeee2e8a04b745d8f4fee33157d # v5.53.0
        env:
          OTEL_EXPORTER_OTLP_ENDPOINT: ${{ secrets.OTEL_EXPORTER_OTLP_ENDPOINT }}
          OTEL_EXPORTER_OTLP_HEADERS: ${{ secrets.OTEL_EXPORTER_OTLP_HEADERS }}
    permissions:
      actions: read
